<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="View user profiles and their blog posts on Hearts of Minecraft.">
    <title>Profile – Hearts of Minecraft</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body { margin:0; padding:0; font-family:'Inter',sans-serif;
            background:url('https://media.discordapp.net/attachments/1475954657997357240/1489016606389436537/Gemini_Generated_Image_smoa5rsmoa5rsmoa.png?ex=69cee247&is=69cd90c7&hm=21043e307e8f4f2b4c366ae396286d7326e9f7df88d4a09f7f7fdb3c65ab9a55&=&format=webp&quality=lossless&width=974&height=544') no-repeat center center fixed; background-size:cover; }
        body::before { content:''; position:fixed; inset:0; background:inherit; filter:blur(10px); transform:scale(1.05); z-index:-1; }
        .hex-grid { position:fixed; inset:0; z-index:-2;
            background:url('data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100"><polygon points="50,5 93.3,25 93.3,75 50,95 6.7,75 6.7,25" fill="none" stroke="rgba(255,255,255,0.1)" stroke-width="1"/></svg>') repeat; }
        .main-container { max-width:1200px; margin:0 auto; padding:20px;
            background:rgba(0,0,0,.7); border-radius:10px; box-shadow:0 0 30px rgba(0,0,0,.7);
            backdrop-filter:blur(10px); border:1px solid rgba(255,255,255,.1); position:relative; z-index:1; }
        .header { display:flex; justify-content:space-between; align-items:center; padding:20px 0; border-bottom:1px solid #333; }
        .logo { font-size:24px; font-weight:bold; color:#fff; }
        .search-bar { flex:1; margin:0 20px; }
        .search-bar input { width:100%; padding:10px; border:none; border-radius:5px;
            background:rgba(255,255,255,.1); color:#fff; box-sizing:border-box; }
        .nav { display:flex; gap:20px; flex-wrap:wrap; }
        .nav a { color:#fff; text-decoration:none; padding:10px 15px; border-radius:5px; transition:background .3s; font-weight:bold; }
        .nav a:hover { background:rgba(255,255,255,.1); }
        .hero { text-align:center; padding:50px 0; }
        .hero h1 { font-size:48px; margin-bottom:20px; color:#fff; }
        .hero p { font-size:18px; margin-bottom:30px; color:#ccc; }
        .content { display:grid; grid-template-columns:1fr; gap:20px; padding:30px 0; }
        .content-block { background:rgba(255,255,255,.1); padding:20px; border-radius:10px; color:#fff; }
        .profile-header { display:flex; align-items:center; gap:16px; margin-bottom:20px; }
        .profile-header img { width:64px; height:64px; border-radius:50%; object-fit:cover; border:2px solid #555; }
        .profile-info h2 { margin:0 0 4px; }
        .profile-info p { margin:0; color:#aaa; font-size:14px; }
        .blog-post { border:1px solid #333; margin:1rem 0; padding:1rem;
            background:rgba(0,0,0,.5); border-radius:8px; text-align:left; }
        .blog-post h3 { color:#fff; margin:0 0 .5rem; }
        .blog-post p { margin:.5rem 0; color:#ccc; }
        .blog-post img { max-width:100%; height:auto; }
        .blog-post.newspaper { column-count:2; font-family:'Times New Roman',serif; font-size:14px; line-height:1.4; }
        .tags { margin:.5rem 0; }
        .tag { display:inline-block; background:#444; color:#fff; padding:.2rem .5rem; margin:.2rem; border-radius:4px; font-size:12px; }
        .footer { text-align:center; padding:20px 0; border-top:1px solid #333; color:#ccc; }
        @media(max-width:768px){ .header{flex-direction:column;gap:20px;} .search-bar{margin:0;} .blog-post.newspaper{column-count:1;} }
    </style>
</head>
<body>
<div class="hex-grid"></div>
<div class="main-container">
    <header class="header">
        <div class="logo">Hearts of Minecraft</div>
        <div class="search-bar">
            <input type="text" id="globalSearch" placeholder="Search...">
        </div>
        <nav class="nav">
            <a href="index.html" data-i18n="nav.home">Home</a>
            <a href="shop.html" data-i18n="nav.shop">Shop</a>
            <a href="map.html" data-i18n="nav.map">Live Map</a>
            <a href="stats.html" data-i18n="nav.stats">Statistics</a>
            <a href="foryou.html" data-i18n="nav.foryou">For You</a>
            <a href="blog.html" data-i18n="nav.blog">Blog</a>
            <a href="about.html" data-i18n="nav.about">About</a>
            <a href="https://discord.gg/A9ZYsud9HY" style="background:#1a75ff;border-radius:5px;padding:10px 15px;">Discord</a>
            <div id="nav-auth"></div>
        </nav>
    </header>

    <section class="hero">
        <h1>User Profile</h1>
        <p>View user information and their blog posts.</p>
    </section>

    <div class="content">
        <div class="content-block">
            <div class="profile-header">
                <img id="profilePic"
                    src="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 60 60'><circle cx='30' cy='30' r='30' fill='%23333'/><text x='30' y='38' text-anchor='middle' fill='%23fff' font-size='20'>?</text></svg>"
                    alt="Profile picture">
                <div class="profile-info">
                    <h2 id="profileName">Loading…</h2>
                    <p id="profileMeta"></p>
                </div>
            </div>
            <h2>Posts by this user</h2>
            <div id="userBlogs"><p style="color:#aaa;">Loading…</p></div>
        </div>
    </div>

    <footer class="footer">
        <p>© 2026 Hearts of Minecraft Server. Not affiliated with Mojang or Paradox Interactive.</p>
    </footer>
</div>

<script src="https://unpkg.com/dexie@3/dist/dexie.min.js"></script>
<script src="js/security.js"></script>
<script src="js/db.js"></script>
<script src="js/i18n.js"></script>
<script src="js/auth-widget.js"></script>
<script src="config.js"></script>
<script>
'use strict';

const NATIONS = {
    'Germany':        { tag:'GER', color:'#aaaaaa' },
    'Soviet Union':   { tag:'SOV', color:'#ff6666' },
    'Japan':          { tag:'JAP', color:'#ffff44' },
    'Italy':          { tag:'ITA', color:'#44ff44' },
    'France':         { tag:'FRA', color:'#6699ff' },
    'United Kingdom': { tag:'ENG', color:'#ff4444' },
    'United States':  { tag:'USA', color:'#4466ff' },
    'China':          { tag:'CHI', color:'#FFD700' }
};

function invertColor(hex) {
    hex = hex.replace('#','');
    if (hex.length === 3) hex = hex.split('').map(c=>c+c).join('');
    const r = 255 - parseInt(hex.slice(0,2),16);
    const g = 255 - parseInt(hex.slice(2,4),16);
    const b = 255 - parseInt(hex.slice(4,6),16);
    return '#'+[r,g,b].map(v=>v.toString(16).padStart(2,'0')).join('');
}

(async () => {
    const params      = new URLSearchParams(window.location.search);
    const username    = params.get('user');
    const currentUser = await DB.getCurrentUser();

    const nameEl  = document.getElementById('profileName');
    const metaEl  = document.getElementById('profileMeta');
    const picEl   = document.getElementById('profilePic');
    const blogsEl = document.getElementById('userBlogs');

    if (!username) {
        nameEl.textContent = 'No user specified.';
        blogsEl.innerHTML  = '';
        return;
    }

    const user = await DB.getUser(username);
    if (!user) {
        nameEl.textContent = 'User not found.';
        blogsEl.innerHTML  = '';
        return;
    }

    security.setSafeDisplayName(nameEl, username, user.nation, NATIONS);
    metaEl.textContent = `Followers: ${(user.followers||[]).length}  ·  Following: ${(user.following||[]).length}`;
    if (user.profilePic && user.profilePic.startsWith('data:image/')) picEl.src = user.profilePic;

    const allBlogs = await DB.getBlogs();
    const now      = new Date();
    const userBlogs = allBlogs.filter(b =>
        b.author === username &&
        (!b.private || username === currentUser) &&
        (!b.publishTime || new Date(b.publishTime) <= now)
    ).sort((a,b) => new Date(b.date) - new Date(a.date));

    blogsEl.innerHTML = '';
    if (!userBlogs.length) {
        blogsEl.innerHTML = '<p style="color:#aaa;">No public posts yet.</p>';
        return;
    }

    userBlogs.forEach(blog => {
        const div = document.createElement('div');
        div.className = 'blog-post' + (blog.format === 'newspaper' ? ' newspaper' : '');
        if (blog.bgColor && blog.bgColor !== '#000000') {
            div.style.backgroundColor = blog.bgColor;
            div.style.color = invertColor(blog.bgColor);
        }

        const h3 = document.createElement('h3');
        h3.textContent = blog.title;
        div.appendChild(h3);

        const datep = document.createElement('p');
        datep.style.cssText = 'font-size:12px;color:#999;';
        datep.textContent = new Date(blog.date).toLocaleString();
        div.appendChild(datep);

        const contentDiv = document.createElement('div');
        contentDiv.innerHTML = security.sanitizeBlogHTML(blog.content);
        div.appendChild(contentDiv);

        if (blog.image && blog.image.startsWith('data:image/')) {
            const img = document.createElement('img');
            img.src = blog.image;
            img.alt = 'Blog image';
            div.appendChild(img);
        }

        if (blog.tags && blog.tags.length) {
            const tagsDiv = document.createElement('div');
            tagsDiv.className = 'tags';
            blog.tags.forEach(t => {
                const span = document.createElement('span');
                span.className = 'tag';
                span.textContent = t;
                tagsDiv.appendChild(span);
            });
            div.appendChild(tagsDiv);
        }

        blogsEl.appendChild(div);
    });
})();

document.getElementById('globalSearch').addEventListener('keydown', async e => {
    if (e.key === 'Enter') {
        const term = e.target.value.trim();
        if (term) { await DB.setSearchTerm(term); window.location.href = 'foryou.html'; }
    }
});
</script>
</body>
</html>
